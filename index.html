<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>內蒙古16日遊 | 現代極簡式旅遊雜誌紀錄</title>
  <!-- 引入 Tailwind CSS 與 Font Awesome 圖示 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --color-roma-blue: #1A2535;
      --color-swiss-blue: #E8F1F5;
      --color-wood: #8C6239;
      --color-bg: #F9F8F6;
    }
    body {
      background-color: var(--color-bg);
      font-family: 'PingFang TC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    /* 輪播無限滾動特效 */
    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-50%); }
    }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee 135s linear infinite;
    }
    .marquee-track:hover {
      animation-play-state: paused;
    }
    /* 防止燈箱開啟時底層網頁滾動 */
    .overflow-hidden-lightbox {
      overflow: hidden !important;
    }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col justify-between">

  <div>
    <!-- 1. 頂部輪播 Banner -->
    <div class="relative w-full overflow-hidden bg-[#1A2535] py-4 border-b border-stone-200 shadow-sm">
      <div id="carousel-track" class="marquee-track"></div>
    </div>

    <!-- 主內容容器 -->
    <main class="max-w-6xl mx-auto px-4 py-12">
      
      <!-- 網頁標題區 -->
      <header class="text-center mb-16">
        <span class="text-xs uppercase tracking-widest text-[#8C6239] font-semibold block mb-3">— TRAVEL JOURNAL —</span>
        
        <div class="flex items-center justify-center gap-3 md:gap-5 mb-4">         
          <h1 class="text-3xl font-bold text-slate-800 mb-2">內蒙古16日遊</h1>
        </div>
        <p class="text-stone-500 font-serif italic">The Grand Tour: Inner Mongo, 2026.08.</p>
      </header>

      <!-- 2. 數據統計看板 -->
      <section class="bg-white border border-stone-200 rounded-lg p-6 md:p-8 mb-12 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex flex-col md:flex-row gap-6 md:gap-12 text-center md:text-left">
          <div>
            <span class="text-xs text-stone-400 uppercase tracking-wider block mb-1">已紀錄的足跡</span>
            <span id="stat-total" class="text-2xl font-light text-[#1A2535]">0 <span class="text-sm text-stone-500">個回憶</span></span>
          </div>
          <div class="border-r border-stone-200 hidden md:block"></div>
          <div>
            <span class="text-xs text-stone-400 uppercase tracking-wider block mb-1">我的私房收藏</span>
            <span id="stat-favorites" class="text-2xl font-light text-[#8C6239]">0 <span class="text-sm text-stone-500">個最愛</span></span>
          </div>
          <div class="mb-6">
            <input
            id="searchInput"
            type="text"
            placeholder="🔍(例：莫河 and 森林公園) ..."
            class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8C6239]"
            >
            <div id="searchResultInfo" class="mt-2 text-sm text-stone-500">
            </div>
          </div>

        </div>
        <button id="btn-reset" class="px-5 py-2 border border-stone-300 text-xs tracking-wider text-stone-600 hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all duration-300 uppercase rounded">
          <i class="fa-regular fa-trash-can mr-2"></i>重設我的最愛
        </button>
      </section>

      <!-- 3. 3x3 照片卡片網格 -->
      <section id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16"></section>

      <!-- 4. 分頁按鈕 -->
      <nav id="pagination" class="flex justify-center items-center gap-2 border-t border-stone-200 pt-8"></nav>

    </main>
  </div>

  <!-- 5. 自訂二次確認 Modal -->
  <div id="confirm-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-xl border border-stone-100 transform scale-95 transition-transform duration-300" id="modal-card">
      <div class="text-center">
        <div class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-triangle-exclamation text-xl"></i>
        </div>
        <h3 class="text-lg font-medium text-stone-900 mb-2">確定要重設收藏嗎？</h3>
        <p class="text-sm text-stone-500 mb-6">這將會清除您在瀏覽器中所保存的所有「我的最愛」景點，且此操作無法復原。</p>
        <div class="flex gap-4 justify-center">
          <button id="modal-cancel" class="px-5 py-2.5 border border-stone-200 text-sm text-stone-600 rounded hover:bg-stone-50 transition-colors duration-200">取消</button>
          <button id="modal-confirm" class="px-5 py-2.5 bg-red-600 text-white text-sm rounded hover:bg-red-700 transition-colors duration-200 shadow-sm">確認清除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 🚀 滿版精緻相簿燈箱 (Lightbox) -->
  <div id="lightbox" class="fixed inset-0 bg-stone-950/95 backdrop-blur-md flex flex-col justify-center items-center z-50 hidden opacity-0 transition-opacity duration-300">
    <!-- 關閉按鈕 -->
    <button id="lightbox-close" class="absolute top-6 right-6 text-white hover:text-stone-300 text-2xl p-2 z-50 focus:outline-none transition-colors" aria-label="關閉燈箱">
      <i class="fa-solid fa-xmark"></i>
    </button>
    
    <!-- 內容容器 -->
    <div class="relative max-w-4xl w-full max-h-[80vh] px-4 flex justify-center items-center select-none" id="lightbox-content-box">
      <!-- 圖片或影片會由 JavaScript 動態塞入這裡 -->
    </div>
    
    <!-- 燈箱下方資訊列 -->
    <div class="mt-6 text-center px-4 max-w-xl">
      <span id="lightbox-category" class="text-xs tracking-widest text-[#8C6239] uppercase font-bold block mb-1">CATEGORY</span>
      <h4 id="lightbox-title" class="text-white text-lg font-light tracking-wide">景點名稱</h4>
    </div>
  </div>

  <!-- 頁尾 -->
  <footer class="text-center py-12 text-xs tracking-widest text-stone-400 uppercase border-t border-stone-200 mt-20">
    © 2026 Memory Lane. All Rights Reserved.
  </footer>

  <script src="main.js"></script>
</body>
</html>
